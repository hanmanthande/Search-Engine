name: OCR-RAG CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Run Backend Tests
  # ──────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OCR system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python packages
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

  # ──────────────────────────────────────────────
  # JOB 2: Build Frontend & Deploy to S3
  # (only on push to main, not on pull requests)
  # ──────────────────────────────────────────────
  frontend-build-deploy:
    name: Frontend Build & Deploy to S3
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend packages
        run: npm install

      - name: Build frontend
        run: npm run build
        env:
          # Injects your EC2 backend URL at build time
          # Set VITE_API_URL secret in GitHub → Settings → Secrets
          # Example value: http://YOUR_EC2_PUBLIC_IP:8000/api
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy dist/ to S3 frontend bucket
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Set index.html cache to no-cache (so updates are picked up instantly)
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

  # ──────────────────────────────────────────────
  # JOB 3: Deploy Backend to EC2
  # (only on push to main, not on pull requests)
  # ──────────────────────────────────────────────
  backend-deploy:
    name: Backend Deploy to EC2
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo ">>> Pulling latest code..."
            cd /home/${{ secrets.EC2_USER }}/app
            git pull origin main

            echo ">>> Activating virtual environment..."
            source venv/bin/activate

            echo ">>> Installing/updating Python dependencies..."
            pip install -r Backend/requirements.txt

            echo ">>> Restarting backend service..."
            sudo systemctl restart ocr-rag-api

            echo ">>> Checking service status..."
            sudo systemctl is-active --quiet ocr-rag-api && echo "Service is running OK" || echo "WARNING: Service failed to start"